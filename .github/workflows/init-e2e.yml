name: Init E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-init-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Build init e2e image
        run: docker build -f e2e/init/Dockerfile -t headroom-init-e2e .

      - name: Run init e2e container
        run: docker run --rm headroom-init-e2e
