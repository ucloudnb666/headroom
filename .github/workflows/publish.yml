name: Publish to PyPI

# DEPRECATED: This workflow is superseded by release.yml.
# Only used for manual PyPI publishing now.
# Manual trigger only — release.yml handles automated publishing.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # For trusted publishing
      contents: write # For uploading release assets

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build cyclonedx-bom

      - name: Build package
        run: |
          python -m build

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install -e ".[proxy]"
          cyclonedx-py environment \
            --output-format json \
            --outfile dist/headroom-sbom.cdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/headroom-sbom.cdx.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
